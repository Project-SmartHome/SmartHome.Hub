version: 2

project_name: SmartHome.Hub

builds:
  - binary: smarthome-hub
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.author=madirajupranay
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
archives:
  - formats: [tar.gz]

checksum:
  name_template: checksums.txt
  
