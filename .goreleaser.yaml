version: 2

project_name: SmartHome.Hub

# =========================================================
# PRE BUILD
# =========================================================

before:
  hooks:
    - bash -c '
        if [ -d "./frontend" ]; then
          cd ./frontend &&
          npm install --legacy-peer-deps &&
          npm run build:hubapp &&
          npm run build:shell
        fi
      '
    - bash -c '
        rm -rf backend/pkg/hub/frontend &&
        mkdir -p backend/pkg/hub/frontend &&
        cp -R frontend/dist/shell backend/pkg/hub/frontend/ &&
        cp -R frontend/dist/hubapp backend/pkg/hub/frontend/ '

# =========================================================
# GO BUILDS
# =========================================================

builds:
  - id: launcher
    dir: ./backend
    main: ./cmd/launcher
    binary: smarthome-hub
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.author=Project-SmartHome
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

# =========================================================
# UNIVERSAL BINARIES
# =========================================================

universal_binaries:
  - id: universal
    replace: true
    name_template: smarthome-hub

# =========================================================
# ARCHIVES
# =========================================================

archives:
  - id: macos
    ids:
      - universal
    formats:
      - tar.gz
      - zip
    wrap_in_directory: true

# =========================================================
# CHECKSUMS
# =========================================================

checksum:
  name_template: checksums.txt

# =========================================================
# RELEASE
# =========================================================

release:
  prerelease: auto
  draft: false

# =========================================================
# CHANGELOG
# =========================================================

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'


# =========================================================
# ANNOUNCEMENTS
# =========================================================

announce:
  skip: true

# =========================================================
# SNAPSHOTS
# =========================================================

snapshot:
  version_template: "{{ incpatch .Version }}-next"

# =========================================================
# EXTRA HOOKS
# =========================================================

source:
  enabled: false

# =========================================================
# BREW (OPTIONAL)
# =========================================================

brews: []

# =========================================================
# SIGNS
# =========================================================

signs: []

# =========================================================
# PUBLISHERS
# =========================================================

publishers:
  - name: macos-pkg
    cmd: bash
      - -c
      - |
        set -e

        rm -rf packaging/root
        rm -rf packaging/scripts

        mkdir -p packaging/root/usr/local/bin
        mkdir -p packaging/root/usr/local/share/smarthome
        mkdir -p packaging/root/Library/LaunchDaemons
        mkdir -p packaging/scripts

        cp dist/smarthome-hub_darwin_all/smarthome-hub \
           packaging/root/usr/local/bin/hub

        chmod +x packaging/root/usr/local/bin/hub

        cp -R frontend/dist \
           packaging/root/usr/local/share/smarthome/frontend

        chmod +x packaging/root/usr/local/bin/hub-uninstall

        chmod +x packaging/scripts/postinstall
        
        pkgbuild \
          --root packaging/root \
          --scripts packaging/scripts \
          --identifier com.smarthome.hub \
          --version {{ .Version }} \
          dist/smarthome-hub.pkg